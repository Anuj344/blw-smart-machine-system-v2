<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Edit Machine | BLW Smart QR System</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <link rel="stylesheet" href="style.css">

</head>

<body class="bg-light">

<!-- Navbar -->

<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow">

    <div class="container">

        <a class="navbar-brand fw-bold">

            🚆 BLW Smart QR Machine System

        </a>

        <a href="admin.html" class="btn btn-light">

            ← Back to Dashboard

        </a>

    </div>

</nav>

<!-- Main -->

<div class="container py-5">

<div class="card shadow border-0">

<div class="card-header bg-primary text-white">

<h3 class="mb-0">

<i class="bi bi-pencil-square"></i>

Edit Machine Details

</h3>

</div>

<div class="card-body">

<form id="editForm" autocomplete="off">

<div class="row">

<div class="col-md-6 mb-3">

<label class="form-label">Machine Name</label>

<input
type="text"
id="machineName"
class="form-control"
required>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">Machine Code</label>

<input
type="text"
id="machineCode"
class="form-control"
required>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">Department</label>

<input
type="text"
id="department"
class="form-control"
required>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">Manufacturer</label>

<input
type="text"
id="manufacturer"
class="form-control">

</div>

<div class="col-md-6 mb-3">

<label class="form-label">

Year of Commissioning

</label>

<input
type="text"
id="year"
class="form-control"
placeholder="Optional">

</div>

<div class="col-md-6 mb-3">

<label class="form-label">

Operator Name

</label>

<input
type="text"
id="operator"
class="form-control">

</div>

<div class="col-md-6 mb-3">

<label class="form-label">

Location

</label>

<input
type="text"
id="location"
class="form-control">

</div>

<div class="col-md-6 mb-3">

<label class="form-label">

Status

</label>

<select
id="status"
class="form-select">

<option value="Working">🟢 Working</option>

<option value="Maintenance">🟡 Maintenance</option>

<option value="Breakdown">🔴 Breakdown</option>

</select>

</div>

</div>

<hr>

<div class="row">

<div class="col-md-6">

<label class="form-label fw-bold">

Current Image

</label>

<br>

<img
id="previewImage"
class="img-thumbnail shadow rounded"
style="width:100%;max-width:320px;height:220px;object-fit:cover;">

</div>

<div class="col-md-6">

<label class="form-label">

Upload New Image

</label>

<input
type="file"
id="image"
class="form-control"
accept="image/png,image/jpeg,image/jpg">

</div>

</div>

<hr>

<div class="mb-3">

<label class="form-label">

Introduction

</label>

<textarea
id="introduction"
rows="4"
class="form-control"></textarea>

</div>

<div class="mb-3">

<label class="form-label">

Working Principle

</label>

<textarea
id="working"
rows="4"
class="form-control"></textarea>

</div>

<div class="mb-3">

<label class="form-label">

Applications

</label>

<input
type="text"
id="applications"
class="form-control"
placeholder="Example: Turning, Drilling, Facing">

</div>

<div class="mb-3">

<label class="form-label">

Safety Precautions

</label>

<input
type="text"
id="safety"
class="form-control"
placeholder="Example: Wear Gloves, Wear Goggles">

</div>

<div class="mb-3">

<label class="form-label">

Maintenance

</label>

<input
type="text"
id="maintenance"
class="form-control"
placeholder="Example: Lubrication, Coolant Check">

</div>

<div class="mb-4">

<label class="form-label">

Main Parts

</label>

<input
type="text"
id="parts"
class="form-control"
placeholder="Example: Chuck, Bed, Tool Post">

</div>

<div class="d-grid gap-2 d-md-flex">

<button
type="submit"
class="btn btn-success flex-fill">

<i class="bi bi-check-circle-fill"></i>

Update Machine

</button>

<a
href="admin.html"
class="btn btn-secondary flex-fill">

Cancel

</a>

</div>

</form>

</div>

</div>

</div>

<!-- Toast -->

<div class="toast-container position-fixed top-0 end-0 p-3">

<div
id="liveToast"
class="toast align-items-center text-bg-success border-0"
role="alert"
data-bs-delay="3000">

<div class="d-flex">

<div
class="toast-body"
id="toastMessage">

Success

</div>

<button
type="button"
class="btn-close btn-close-white me-2 m-auto"
data-bs-dismiss="toast">

</button>

</div>

</div>

</div>

<!-- Footer -->

<footer class="text-center py-4 text-muted">

© 2026 BLW Smart QR Machine Information System

</footer>

<!-- Bootstrap -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- Edit JS -->

<script src="edit.js"></script>

</body>

</html>
