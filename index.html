<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>BLW Smart QR Machine Information System</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- ================= NAVBAR ================= -->

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow">

        <div class="container">

            <a class="navbar-brand fw-bold fs-3" href="#">
                🚆 BLW
            </a>

            <button class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbar">

                <span class="navbar-toggler-icon"></span>

            </button>

            <div class="collapse navbar-collapse" id="navbar">

                <ul class="navbar-nav ms-auto">

                    <li class="nav-item">

                        <a class="nav-link active" href="index.html">

                            Home

                        </a>

                    </li>

                    <li class="nav-item">

                        <a class="nav-link" href="admin.html">

                            Admin

                        </a>

                    </li>

                </ul>

            </div>

        </div>

    </nav>

    <!-- ================= HERO ================= -->

    <section class="hero py-5 text-center text-white">

        <div class="container">

            <h1 class="display-4 fw-bold">

                Smart QR Machine Information System

            </h1>

            <p class="lead">

                Banaras Locomotive Works

            </p>

            <input
                type="text"
                id="searchInput"
                class="form-control mx-auto mt-4"
                style="max-width:500px;"
                placeholder="Search Machine by Name">

        </div>

    </section>

    <!-- ================= STATISTICS ================= -->

    <section class="py-5">

        <div class="container">

            <div class="row text-center g-4">

                <div class="col-md-4">

                    <div class="stat-card shadow">

                        <h2 id="machineCount">0</h2>

                        <p>Total Machines</p>

                    </div>

                </div>

                <div class="col-md-4">

                    <div class="stat-card shadow">

                        <h2>24×7</h2>

                        <p>Availability</p>

                    </div>

                </div>

                <div class="col-md-4">

                    <div class="stat-card shadow">

                        <h2>100%</h2>

                        <p>QR Enabled</p>

                    </div>

                </div>

            </div>

        </div>

    </section>

    <!-- ================= MACHINE LIST ================= -->

    <section class="pb-5">

        <div class="container">

            <div class="d-flex justify-content-between align-items-center mb-4">

                <h2 class="fw-bold">

                    Available Machines

                </h2>

            </div>

            <div class="row g-4" id="machineContainer">

                <!-- Cards yaha admin.js / machines.js se aayenge -->

            </div>

        </div>

    </section>

    <!-- ================= FOOTER ================= -->

    <footer class="bg-dark text-white text-center py-3">

        © 2026 BLW Smart Machine Information System

    </footer>

    <script src="machines.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
